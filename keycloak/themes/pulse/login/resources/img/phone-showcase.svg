<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 454 618" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#833ab4"/>
      <stop offset="50%" stop-color="#fd1d1d"/>
      <stop offset="100%" stop-color="#fcb045"/>
    </linearGradient>
    <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#405de6"/>
      <stop offset="100%" stop-color="#5851db"/>
    </linearGradient>
    <linearGradient id="g3" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f77737"/>
      <stop offset="100%" stop-color="#c13584"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Phone frame -->
  <rect x="127" y="40" width="200" height="400" rx="28" fill="#1a1a1a" filter="url(#shadow)"/>
  <rect x="135" y="52" width="184" height="376" rx="22" fill="#000"/>
  <rect x="195" y="58" width="64" height="6" rx="3" fill="#2a2a2a"/>

  <!-- Screen content - feed mockup -->
  <rect x="143" y="72" width="168" height="48" fill="#fff"/>
  <circle cx="163" cy="96" r="14" fill="url(#g1)"/>
  <rect x="185" y="86" width="60" height="8" rx="4" fill="#efefef"/>
  <rect x="185" y="100" width="40" height="6" rx="3" fill="#f5f5f5"/>
  <rect x="143" y="120" width="168" height="168" fill="url(#g2)"/>
  <rect x="143" y="288" width="24" height="24" rx="4" fill="#efefef"/>
  <rect x="175" y="288" width="24" height="24" rx="4" fill="#efefef"/>
  <rect x="207" y="288" width="24" height="24" rx="4" fill="#efefef"/>
  <rect x="143" y="320" width="120" height="8" rx="4" fill="#efefef"/>
  <rect x="143" y="334" width="80" height="6" rx="3" fill="#f5f5f5"/>

  <!-- Floating card top-left -->
  <g transform="rotate(-6 80 180)">
    <rect x="20" y="120" width="120" height="120" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="28" y="128" width="104" height="80" rx="4" fill="url(#g3)"/>
    <circle cx="44" cy="220" r="10" fill="url(#g1)"/>
    <rect x="60" y="214" width="50" height="6" rx="3" fill="#efefef"/>
  </g>

  <!-- Floating card top-right -->
  <g transform="rotate(8 370 140)">
    <rect x="310" y="80" width="110" height="110" rx="8" fill="#fff" filter="url(#shadow)"/>
    <circle cx="365" cy="115" r="22" fill="url(#g2)"/>
    <rect x="325" y="148" width="80" height="6" rx="3" fill="#efefef"/>
    <rect x="335" y="160" width="60" height="6" rx="3" fill="#f5f5f5"/>
  </g>

  <!-- Floating heart notification -->
  <g transform="rotate(-4 60 380)">
    <rect x="10" y="360" width="100" height="56" rx="28" fill="#fff" filter="url(#shadow)"/>
    <circle cx="38" cy="388" r="16" fill="url(#g1)"/>
    <path d="M72 380c0-6 5-10 10-10s10 4 10 10c0 12-20 22-20 22s-20-10-20-22z" fill="#ed4956" transform="translate(8,2) scale(0.7)"/>
    <rect x="58" y="382" width="40" height="6" rx="3" fill="#efefef"/>
    <rect x="58" y="394" width="28" height="5" rx="2.5" fill="#f5f5f5"/>
  </g>

  <!-- Bottom floating card -->
  <g transform="rotate(5 380 420)">
    <rect x="300" y="400" width="130" height="90" rx="8" fill="#fff" filter="url(#shadow)"/>
    <rect x="308" y="408" width="114" height="58" rx="4" fill="url(#g3)"/>
    <rect x="308" y="472" width="70" height="6" rx="3" fill="#efefef"/>
  </g>
</svg>
