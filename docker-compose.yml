services:
  keycloak-db:
    image: postgres:16-alpine
    container_name: pulse-keycloak-db
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_pass
    ports:
      - '5433:5432'
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U keycloak -d keycloak_db']
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: pulse-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_pass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_pass
    ports:
      - '8080:8080'
    volumes:
      - app_db_data:/var/lib/postgresql/data
    depends_on:
      keycloak-db:
        condition: service_healthy

  app-db:
    image: postgres:16-alpine
    container_name: pulse-app-db
    environment:
      POSTGRES_DB: pulse_app_db
      POSTGRES_USER: pulse_app
      POSTGRES_PASSWORD: pulse_app_pass
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pulse_app -d pulse_app_db']
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: pulse-mailhog
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  keycloak_db_data:
  app_db_data:
